# Use of "*" to use all namespaces defined.
source:
  index:
    - "logs-qualys_gav.asset-*"
# The version suffix on the dest.index should be incremented if a breaking
# change is made to the index mapping or settings (for example index.mode).
# You must also bump the fleet_transform_version for any change to this
# transform configuration to take effect. The old destination index is not
# automatically removed. We are dependent on
# https://github.com/elastic/package-spec/issues/523 to give us that ability
# in order to prevent having duplicate data and prevent query time field type
# conflicts.
dest:
  index: "logs-qualys_gav_latest.dest_asset-3"
  aliases:
    - alias: "logs-qualys_gav_latest.asset"
      move_on_creation: true
latest:
  unique_key:
    - event.dataset
    - host.id
  sort: "@timestamp"
description: >-
  Latest Assets from Qualys Global AssetView. As assets get updated, this transform stores only the latest state of each asset inside the destination index. Thus the transform's destination index contains only the latest state of the asset.
frequency: 30s
settings:
  # This is required to prevent the transform from clobbering the Fleet-managed mappings.
  deduce_mappings: false
  unattended: true
sync:
  time:
    field: "event.ingested"
    # Updated to 120s because of refresh delay in Serverless. With default 60s,
    # sometimes transform wouldn't process all documents.
    delay: 120s
retention_policy:
  time:
    field: "event.ingested"
    max_age: 30d
_meta:
  managed: false
  # Bump this version to delete, reinstall, and restart the transform during
  # package installation.
  fleet_transform_version: 0.4.0
  run_as_kibana_system: false
