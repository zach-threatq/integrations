---
description: Minimal ingest pipeline for Contrast Security incidents.
processors:
  - script:
      tag: coerce_non_object_event
      if: ctx.event != null && !(ctx.event instanceof Map)
      lang: painless
      source: >-
        def original = ctx.event;
        ctx.event = new HashMap();
        ctx.event.original = Json.dump(original);
  - set:
      tag: set_event_dataset
      field: event.dataset
      value: "contrast_security.incident"
      override: false
  - set:
      tag: set_event_module
      field: event.module
      value: "contrast_security"
      override: false
  - set:
      tag: set_event_kind
      field: event.kind
      value: "alert"
      override: false
  - set:
      tag: set_timestamp_from_event_created
      field: "@timestamp"
      copy_from: event.created
      ignore_empty_value: true
      if: ctx['@timestamp'] == null
  - date:
      tag: date_timestamp
      field: "@timestamp"
      target_field: "@timestamp"
      formats:
        - ISO8601
        - UNIX_MS
      ignore_failure: true
  - script:
      tag: remove_null_empty_fields
      description: Recursively removes null fields and empty objects/arrays from the document.
      lang: painless
      source: |-
        boolean drop(Object o) {
          if (o == null) {
            return true;
          } else if (o instanceof Map) {
            ((Map) o).values().removeIf(v -> drop(v));
            return (((Map) o).size() == 0);
          } else if (o instanceof List) {
            ((List) o).removeIf(v -> drop(v));
            return (((List) o).length == 0);
          }
          return false;
        }
        drop(ctx);
on_failure:
  - append:
      tag: append_error_message
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}' in pipeline '{{{ _ingest.pipeline }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      tag: set_pipeline_error
      field: event.kind
      value: pipeline_error
  - append:
      tag: append_preserve_original_event
      field: tags
      value: preserve_original_event
      allow_duplicates: false
