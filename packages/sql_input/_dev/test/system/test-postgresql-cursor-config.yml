# Cursor-based incremental fetching requires the SQL module cursor backend,
# available in the Elastic Agent bundled with Elastic Stack 9.4+. CI tests this
# package against its oldest declared Kibana version (manifest.yml kibana.version
# is ^9.1.0), so this test cannot run there; it has been verified manually
# against a 9.4.3 stack. Re-enable once the package's minimum supported version
# is raised to 9.4+, or elastic-package supports a version-gated skip.
skip:
  reason: "Cursor mode requires Elastic Stack 9.4+ (elastic/beats#48722); CI tests this package at its oldest declared Kibana version (9.1.0)"
  link: https://github.com/elastic/beats/pull/48722
service: sql_input_postgresql
vars:
  hosts:
    - postgres://postgres:mysecretpassword@{{Hostname}}:{{Port}}/postgres?sslmode=disable
  driver: "postgres"
  # PostgreSQL translates the :cursor placeholder to $1. id is CAST to TEXT so the
  # emitted sql.metrics.* fields are keywords (matching the package field mappings,
  # as the mssql/postgresql non-cursor tests also do); WHERE and ORDER BY use the
  # real integer column so the integer cursor advances correctly.
  sql_query: 'SELECT CAST(id AS TEXT) AS id, event_type, payload FROM audit_log WHERE id > :cursor ORDER BY id ASC LIMIT 500'
  cursor: |
    enabled: true
    column: id
    type: integer
    default: "0"
