title: Audit
type: logs
streams:
  - input: cel
    title: Audit logs
    description: Collect Audit logs from Cyera.
    template_path: cel.yml.hbs
    vars:
      - name: audit_url
        type: text
        title: Audit URL
        description: Base URL of the Cyera audit API. The audit trail is served from the Cyera authentication host, which is separate from the data API host.
        default: https://auth.cyera.io
        multi: false
        required: true
        show_user: true
      - name: initial_interval
        type: text
        title: Initial Interval
        description: How far back to pull the Audit logs from Cyera API. Supported units for this parameter are h/m/s.
        default: 24h
        multi: false
        required: true
        show_user: true
      - name: interval
        type: text
        title: Interval
        description: Duration between requests to the Cyera API. Supported units for this parameter are h/m/s.
        default: 5m
        multi: false
        required: true
        show_user: true
      - name: batch_size
        type: integer
        title: Batch Size
        description: Batch size for the response of the Cyera API. The batch size can range from a minimum of 1 to a maximum of 200.
        default: 200
        multi: false
        required: true
        show_user: true
      - name: http_client_timeout
        type: text
        title: HTTP Client Timeout
        description: Duration before declaring that the HTTP client connection has timed out. Valid time units are ns, us, ms, s, m, h.
        multi: false
        required: true
        show_user: false
        default: 30s
      - name: enable_request_tracer
        type: bool
        title: Enable request tracing
        multi: false
        required: false
        show_user: false
        default: false
        description: >-
          The request tracer logs requests and responses to the agent's local file-system for debugging configurations. Enabling this request tracing compromises security and should only be used for debugging. Disabling the request tracer will delete any stored traces. See [documentation](https://www.elastic.co/guide/en/beats/filebeat/current/filebeat-input-cel.html#_resource_tracer_enable) for details.
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: false
        default:
          - forwarded
          - cyera-audit
      - name: preserve_original_event
        required: true
        show_user: true
        title: Preserve original event
        description: Preserves a raw copy of the original event, added to the field event.original.
        type: bool
        multi: false
        default: false
      - name: processors
        type: yaml
        title: Processors
        multi: false
        required: false
        show_user: false
        description: |-
          Processors are used to reduce the number of fields in the exported event or to enhance the event with metadata.
          This executes in the agent before the logs are parsed.
          See [Processors](https://www.elastic.co/guide/en/beats/filebeat/current/filtering-and-enhancing-data.html) for details.
