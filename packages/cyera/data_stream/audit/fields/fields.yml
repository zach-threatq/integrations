- name: cyera
  type: group
  fields:
    - name: audit
      type: group
      fields:
        - name: environment_name
          type: keyword
          description: Name of the Cyera environment where the action was performed.
        - name: tenant_id
          type: keyword
          description: Unique identifier of the tenant associated with the audit entry.
        - name: updated_at
          type: date
          description: Date when the audit entry was last updated.
        - name: vendor_id
          type: keyword
          description: Unique identifier of the vendor associated with the audit entry.
