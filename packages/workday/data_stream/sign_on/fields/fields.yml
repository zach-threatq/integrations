- name: workday
  type: group
  fields:
    - name: sign_on
      type: group
      fields:
        - name: Account
          type: keyword
          description: The Workday account associated with the sign-on (for example, the account user name and worker display name).
        - name: Account_Locked__Disabled_or_Expired
          type: boolean
          description: Whether the account was locked, disabled, or expired at the time of the sign-on.
        - name: Active_Session
          type: boolean
          description: Whether the session was still active at the time the report was generated.
        - name: Authentication_Channel
          type: keyword
          description: The channel through which the sign-on was performed (for example, Web, Mobile, API).
        - name: Authentication_Type
          type: keyword
          description: The authentication method used for the sign-on (for example, SAML, OAuth 2.0, Trusted, User Name Password, ID Token).
        - name: Authentication_Type_for_Signon
          type: keyword
          description: The authentication method used for the sign-on (for example, SAML, OAuth 2.0, Biometric, User Name Password).
        - name: Browser_Type
          type: keyword
          description: The browser or client application used for the sign-on (for example, Chrome, Workday Phone App).
        - name: Device_is_Trusted
          type: boolean
          description: Whether the device used for the sign-on is trusted.
        - name: Failed_Signon
          type: boolean
          description: Whether the sign-on attempt failed.
        - name: Forgotten_Password_Reset_Request
          type: boolean
          description: Whether the sign-on was associated with a forgotten password reset request.
        - name: Invalid_Credentials
          type: boolean
          description: Whether the sign-on attempt was made with invalid credentials.
        - name: Invalid_Password
          type: boolean
          description: Whether the sign-on attempt was made with an invalid password.
        - name: Is_Device_Managed
          type: boolean
          description: Whether the device used for the sign-on is managed.
        - name: Multi_Factor_Type
          type: keyword
          description: The type of multi-factor authentication used for the sign-on.
        - name: Password_Changed
          type: boolean
          description: Whether the password was changed during the sign-on.
        - name: Prompt___Positive_Integer
          type: keyword
          description: The sign-on prompt value as reported by Workday, typically the account name and worker display name.
        - name: Request_Originator
          type: keyword
          description: The originator of the sign-on request (for example, UI, Internal, Web Services).
        - name: Required_Multi_Factor
          type: keyword
          description: The type of multi-factor authentication required for the sign-on (for example, SMS, Email, Phone, Security Key).
        - name: SAML_Identity_Provider
          type: keyword
          description: The SAML identity provider used for the sign-on.
        - name: Session_ID
          type: keyword
          description: The Workday session identifier associated with the sign-on.
        - name: session_ip_address_string
          type: keyword
          description: The originating IP address of the session (alternate report column name for Session_IP_Address).
        - name: signon_ip_address_string
          type: keyword
          description: The originating IP address of the sign-on (alternate report column name for Signon_IP_Address).
        - name: Signon
          type: boolean
          description: Whether the sign-on attempt was successful.
        - name: Successful
          type: boolean
          description: Whether the sign-on attempt was successful.
        - name: System_Account
          type: keyword
          description: The Workday system account associated with the sign-on (for example, the account user name and worker display name).
        - name: UI_Client_Type
          type: keyword
          description: The type of UI client used for the sign-on (for example, iPhone Native, Android Native).
        - name: Workday_Account
          type: keyword
          description: The Workday account associated with the sign-on (alternate report column name for System_Account).
