format_version: 3.4.2
name: workday
title: 'Workday'
version: 0.3.0
description: 'Collect logs from Workday with Elastic Agent.'
type: integration
categories:
  - security
conditions:
  kibana:
    version: '^8.18.0 || ^9.1.0'
  elastic:
    subscription: 'basic'
screenshots:
  - src: /img/workday-activity-dashboard.png
    title: Activity Dashboard
    size: 600x600
    type: image/png
  - src: /img/workday-signon-dashboard.png
    title: Workday Sign On Dashboard
    size: 600x600
    type: image/png
icons:
  - src: /img/workday-logo.svg
    title: Workday logo
    size: 32x32
    type: image/svg+xml
policy_templates:
  - name: workday
    title: Workday logs
    description: Collect Workday logs.
    deployment_modes:
      default:
        enabled: true
      agentless:
        enabled: true
        organization: security
        division: engineering
        team: security-service-integrations
    inputs:
      - type: cel
        title: Collect Workday logs via API
        description: Collecting logs from Workday via CEL input.
        vars:
          - name: proxy_url
            type: text
            title: Proxy URL
            description: proxy configuration in the form of https://<user>:<password>@<server name/ip>:<port>.
            multi: false
            required: false
            show_user: false
          - name: ssl
            type: yaml
            title: SSL Configuration
            description: SSL configuration options. See [documentation](https://www.elastic.co/guide/en/beats/filebeat/current/configuration-ssl.html#ssl-common-config) for details.
            multi: false
            required: false
            show_user: false
            default: |
