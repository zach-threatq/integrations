title: Claude Cowork events
type: logs
streams:
  - input: otelcol
    title: Claude Cowork events
    description: Receive Claude Cowork OTLP log events.
    vars:
      - name: preserve_original_event
        required: true
        show_user: true
        title: Preserve original event
        description: >-
          Preserves a JSON copy of the raw OTel event in the field event.original. Increases storage but useful for forensic analysis.
        type: bool
        multi: false
        default: false
