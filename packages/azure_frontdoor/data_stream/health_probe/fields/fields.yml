- name: azure.frontdoor
  type: group
  fields:
    - name: resource_id
      type: keyword
      description: Azure Resource ID.
    - name: category
      type: keyword
      description: Azure Frontdoor category name.
    - name: operation_name
      type: keyword
      description: Azure operation name.
    - name: health_probe
      type: group
      fields:
        - name: health_probe_id
          type: keyword
          description: Unique identifier for the health probe request.
        - name: pop
          type: keyword
          description: The edge PoP (Point of Presence) that issued the health probe.
        - name: result
          type: keyword
          description: "Result of the health probe (examples: OriginError, Success)."
        - name: origin_name
          type: keyword
          description: The hostname of the origin that was probed.
        - name: total_latency_milliseconds
          type: long
          description: Total latency of the health probe in milliseconds.
        - name: connection_latency_milliseconds
          type: long
          description: TCP connection latency of the health probe in milliseconds.
        - name: dns_latency_microseconds
          type: long
          description: DNS resolution latency of the health probe in microseconds.
