---
description: >-
  Parse Kolide deprovisioned-person records from GET /deprovisioned_people (CEL). See
  https://kolideapi.readme.io/reference/get_deprovisioned-people. This is a separate
  resource from GET /people (the `people` data stream), not a field on the person
  object. Schema: id, name, email, created_at, last_authenticated_at (nullable),
  has_registered_device, and api_url (a link back to the corresponding
  `GET /people/{id}` resource — note it still points at `/people`, not
  `/deprovisioned_people`). Unlike `people`, this resource does not return
  `usernames`.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: '9.4.0'

  # --- CEL input only (Agentless metadata + collector error placeholders) ---
  - remove:
      field:
        - organization
        - division
        - team
      ignore_missing: true
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      tag: remove_agentless_tags
      description: >-
        Removes the fields added by Agentless as metadata,
        as they can collide with ECS fields.
  - terminate:
      tag: data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
      description: error message set and no data to process.
  # --- end CEL-only ---

  # CEL / JSE00001: `message` is a JSON string of one GET /deprovisioned_people record.
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      target_field: json
      tag: parse_json_cel
      if: ctx.json == null && ctx.event?.original != null
      description: Decode the CEL message (a JSON string of one deprovisioned-person object) into the working json object.

  # The /deprovisioned_people API is a state snapshot with no record timestamp; use ingest time.
  - set:
      field: '@timestamp'
      copy_from: _ingest.timestamp
      tag: set_timestamp_api_ingest

  - set:
      field: event.kind
      tag: set_event_kind
      value: state
  - set:
      field: event.action
      tag: set_event_action
      value: person_deprovisioned
  - append:
      field: event.category
      tag: append_event_category_iam
      value: iam
      allow_duplicates: false
  - append:
      field: event.type
      tag: append_event_type_user
      value: user
      allow_duplicates: false
  - append:
      field: event.type
      tag: append_event_type_info
      value: info
      allow_duplicates: false

  # ECS identity.
  - convert:
      field: json.id
      target_field: user.id
      type: string
      tag: convert_user_id
      ignore_missing: true
  - set:
      field: user.email
      tag: set_user_email
      copy_from: json.email
      if: ctx.json?.email instanceof String
  - set:
      field: user.full_name
      tag: set_user_full_name
      copy_from: json.name
      if: ctx.json?.name instanceof String
  - set:
      field: user.name
      tag: set_user_name_from_email
      copy_from: user.email
      if: ctx.user?.name == null && ctx.user?.email instanceof String

  # Kolide custom deprovisioned-person fields.
  - set:
      field: kolide.deprovisioned_person.id
      tag: set_kolide_deprovisioned_person_id
      copy_from: user.id
      if: ctx.user?.id != null
  - rename:
      field: json.created_at
      target_field: kolide.deprovisioned_person.created_at
      tag: rename_created_at
      ignore_missing: true
  - date:
      field: kolide.deprovisioned_person.created_at
      target_field: kolide.deprovisioned_person.created_at
      formats:
        - ISO8601
      tag: date_created_at
      if: ctx.kolide?.deprovisioned_person?.created_at != null
  - rename:
      field: json.last_authenticated_at
      target_field: kolide.deprovisioned_person.last_authenticated_at
      tag: rename_last_authenticated_at
      ignore_missing: true
  - date:
      field: kolide.deprovisioned_person.last_authenticated_at
      target_field: kolide.deprovisioned_person.last_authenticated_at
      formats:
        - ISO8601
      tag: date_last_authenticated_at
      if: ctx.kolide?.deprovisioned_person?.last_authenticated_at != null
  - rename:
      field: json.has_registered_device
      target_field: kolide.deprovisioned_person.has_registered_device
      tag: rename_has_registered_device
      ignore_missing: true
  - rename:
      field: json.api_url
      target_field: kolide.deprovisioned_person.api_url
      tag: rename_api_url
      ignore_missing: true
      description: >-
        Points at the corresponding GET /people/{id} resource, not a
        /deprovisioned_people path.

  # related.* enrichment.
  - append:
      field: related.user
      tag: append_related_user_email
      value: '{{{user.email}}}'
      allow_duplicates: false
      if: ctx.user?.email != null
  - append:
      field: related.user
      tag: append_related_user_name
      value: '{{{user.name}}}'
      allow_duplicates: false
      if: ctx.user?.name != null
  - append:
      field: related.user
      tag: append_related_user_id
      value: '{{{user.id}}}'
      allow_duplicates: false
      if: ctx.user?.id != null

  # Deduplication: /deprovisioned_people is a full-table snapshot with no
  # modified-since filter, so the CEL program re-walks every record on every
  # poll. Fingerprint the full raw record (event.original) minus
  # last_authenticated_at — expected to be static once a person is
  # deprovisioned, but excluded defensively for consistency with the `people`
  # pipeline's fingerprint scheme. Re-parse event.original into a temp object
  # so every other field is included automatically (new API fields too); only
  # last_authenticated_at is dropped.
  - json:
      field: event.original
      target_field: _tmp.fingerprint_source
      tag: parse_fingerprint_source
      if: ctx.event?.original != null && ctx.event.original != ''
  - remove:
      field: _tmp.fingerprint_source.last_authenticated_at
      tag: remove_last_authenticated_at_from_fingerprint
      ignore_missing: true
      if: ctx._tmp?.fingerprint_source != null
  - fingerprint:
      fields:
        - _tmp.fingerprint_source
      target_field: _id
      method: SHA-256
      tag: fingerprint_event_original_no_last_authenticated_at
      if: ctx._tmp?.fingerprint_source != null

  # Cleanup.
  - remove:
      field:
        - json
        - _tmp
      tag: remove_temp_fields
      ignore_missing: true
  - append:
      field: tags
      tag: append_preserve_original_event
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
  - script:
      description: Drops null/empty values recursively.
      tag: script_to_drop_null_values
      lang: painless
      source: |-
        boolean drop(Object object) {
          if (object == null || object == '') {
            return true;
          } else if (object instanceof Map) {
            ((Map) object).values().removeIf(v -> drop(v));
            return (((Map) object).size() == 0);
          } else if (object instanceof List) {
            ((List) object).removeIf(v -> drop(v));
            return (((List) object).length == 0);
          }
          return false;
        }
        drop(ctx);

on_failure:
  - append:
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
