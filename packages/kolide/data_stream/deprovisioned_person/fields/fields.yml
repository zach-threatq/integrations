- name: kolide.deprovisioned_person
  type: group
  description: Custom fields for Kolide deprovisioned people, collected from the REST API (GET /deprovisioned_people).
  fields:
    - name: id
      type: keyword
      description: Kolide person identifier.
    - name: created_at
      type: date
      description: Timestamp at which the person record was originally created.
    - name: last_authenticated_at
      type: date
      description: When the person last authenticated with Kolide, prior to deprovisioning.
    - name: has_registered_device
      type: boolean
      description: Whether the person had at least one registered device at the time of deprovisioning.
    - name: api_url
      type: keyword
      description: >-
        Kolide REST API URL for the corresponding person resource. Points at GET /people/{id}, not a /deprovisioned_people path.
