rules:
  # Page 2: follows pagination.next (cursor=CURSORPAGE2). Terminal page. Must
  # precede the page-1 catch-all below since rule matching is first-match-wins
  # and the page-1 rule (per_page only) would otherwise also match this request.
  - path: /deprovisioned_people
    methods: ['GET']
    query_params:
      per_page: '{per_page:.*}'
      cursor: 'CURSORPAGE2'
    request_headers:
      Authorization:
        - 'Bearer k2sk_v1_exampleexampleexample'
      X-Kolide-Api-Version:
        - '2026-04-07'
    responses:
      - status_code: 200
        headers:
          Content-Type:
            - 'application/json'
        body: |-
          {
            "data": [
              {
                "id": "864140",
                "name": "Bob Smith",
                "email": "bob.smith@example.com",
                "created_at": "2026-06-05T12:24:21.995Z",
                "last_authenticated_at": null,
                "has_registered_device": false,
                "api_url": "https://api.kolide.com/people/864140"
              }
            ],
            "pagination": {
              "next": "",
              "current_cursor": "CURSORPAGE2",
              "next_cursor": "",
              "count": 1
            }
          }
  # Page 1: initial request (per_page only, no cursor). Returns one
  # deprovisioned person and a next-page cursor token.
  - path: /deprovisioned_people
    methods: ['GET']
    query_params:
      per_page: '{per_page:.*}'
    request_headers:
      Authorization:
        - 'Bearer k2sk_v1_exampleexampleexample'
      X-Kolide-Api-Version:
        - '2026-04-07'
    responses:
      - status_code: 200
        headers:
          Content-Type:
            - 'application/json'
        body: |-
          {
            "data": [
              {
                "id": "861637",
                "name": "Alice Johnson",
                "email": "alice.johnson@example.com",
                "created_at": "2026-06-04T18:29:22.129Z",
                "last_authenticated_at": "2024-06-15T12:00:00Z",
                "has_registered_device": false,
                "api_url": "https://api.kolide.com/people/861637"
              }
            ],
            "pagination": {
              "next": "http://{{ hostname }}:{{ env "PORT" }}/deprovisioned_people?per_page={{ .request.vars.per_page }}&cursor=CURSORPAGE2",
              "current_cursor": "",
              "next_cursor": "CURSORPAGE2",
              "count": 1
            }
          }
