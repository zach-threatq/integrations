version: '2.3'
services:
  kolide-audit:
    image: docker.elastic.co/observability/stream:v0.20.0
    hostname: kolide-audit
    ports:
      - 8090
    volumes:
      - ./files:/files:ro
    environment:
      PORT: '8090'
    command:
      - http-server
      - --addr=:8090
      - --config=/files/config-audit.yml
  gcs-mock:
    image: shourieg/gcs-mock-service:latest
    ports:
      - "4443/tcp"
    volumes:
      - ./files/gcs-manifest.yml:/app/manifest.yml:ro
      - ./files/gcs:/data:ro
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://localhost:4443/health || exit 1"
      interval: 10s
      timeout: 5s
    command: ["./gcs-mock-service", "--manifest", "/app/manifest.yml"]
