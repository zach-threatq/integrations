fields:
  tags:
    - preserve_original_event
dynamic_fields:
  # blocks_device_at is a future enforcement deadline (2099-01-01), far beyond
  # any real "now". @timestamp is capped at ingest time rather than being
  # allowed to jump to that future date, so it is inherently non-deterministic
  # here -- this fixture's purpose is to prove the pipeline still completes
  # without error and does NOT set @timestamp to the literal future value.
  "@timestamp": "^.*$"
