- name: kolide.people
  type: group
  description: Custom fields for Kolide people, collected from the REST API (GET /people).
  fields:
    - name: id
      type: keyword
      description: Kolide person identifier.
    - name: usernames
      type: keyword
      description: Usernames imported from the SCIM provider associated with this person.
    - name: last_authenticated_at
      type: date
      description: When the person last authenticated with Kolide.
    - name: has_registered_device
      type: boolean
      description: Whether the person has at least one registered device.
    - name: created_at
      type: date
      description: Timestamp at which the person record was created.
