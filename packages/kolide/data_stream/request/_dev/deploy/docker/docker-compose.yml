version: '2.3'
services:
  kolide-request:
    image: docker.elastic.co/observability/stream:v0.20.0
    hostname: kolide-request
    ports:
      - 8090
    volumes:
      - ./files:/files:ro
    environment:
      PORT: '8090'
    command:
      - http-server
      - --addr=:8090
      - --config=/files/config-request.yml
  kolide-request-empty-registration:
    image: docker.elastic.co/observability/stream:v0.20.0
    hostname: kolide-request-empty-registration
    ports:
      - 8090
    volumes:
      - ./files:/files:ro
    environment:
      PORT: '8090'
    command:
      - http-server
      - --addr=:8090
      - --config=/files/config-request-empty-registration.yml
