---
description: Pipeline for processing count logs from Stormshield appliances.
processors:
  - script:
      tag: script_process_devices
      lang: painless
      description: Process device stat fields, skipping counters that do not parse.
      params:
        devices:
          - Rule
        stats:
          - Implicit Filter Rule
          - Global Filter Rule
          - Local Filter Rule
          - Implicit NAT Rule
          - Global NAT Rule
          - Local NAT Rule
      source: >-
        boolean isNumeric(def s) {
          if (!(s instanceof String) || s.isEmpty() || s.length() > 18) {
            return false;
          }
          for (int i = 0; i < s.length(); i++) {
            if (Character.isDigit(s.charAt(i)) == false) {
              return false;
            }
          }
          return true;
        }
        def ruleStats = [];
        def ruleKeys = [];
        def str = "Rule";
        ctx.stormshield.forEach((k, v) -> {
          if (k.startsWith(str) && k.indexOf(":") > str.length()) {
            ruleKeys.add(k);
            def parts = k.substring(str.length()).splitOnToken(":");
            if (parts.length == 2 && isNumeric(v) && isNumeric(parts[1]) && parts[0].length() == 1 && isNumeric(parts[0])) {
              int category = Integer.parseInt(parts[0]);
              if (category < params.stats.size()) {
                def item = [:];
                item["original"] = k;
                item["byte_count"] = Long.parseLong(v);
                item["category"] = params.stats[category];
                item["rule_number"] = Long.parseLong(parts[1]);
                ruleStats.add(item);
              }
            }
          }

          return true;
        });

        for (k in ruleKeys) {
          ctx.stormshield.remove(k);
        }

        if (ruleStats.isEmpty()) {
          return;
        }

        ruleStats.sort((a, b) -> a["original"].compareTo(b["original"]));
        if (!ctx.stormshield.containsKey("metadata")) {
          ctx.stormshield.metadata = [:];
        }
        ctx.stormshield.metadata.rule_stats = ruleStats;
on_failure:
  - append:
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{#_ingest.on_failure_processor_tag}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{/_ingest.on_failure_processor_tag}}in pipeline '{{{ _ingest.pipeline }}}'
        failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
