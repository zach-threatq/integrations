# Worst-case O365 audit record: an AzureActiveDirectory STS logon shape, the
# fattest common o365 record (~10 KB). Every field here must be referenced by
# template.ndjson via `generate "<name>"`; every `generate` in the template must
# have a matching entry here.
- name: Id
  type: keyword
- name: CreationTime
  type: date
- name: RecordType
  type: integer
- name: Operation
  type: keyword
- name: OrganizationId
  type: keyword
- name: UserType
  type: integer
- name: UserKey
  type: keyword
- name: Workload
  type: keyword
- name: ResultStatus
  type: keyword
- name: ObjectId
  type: keyword
- name: UserId
  type: keyword
- name: ClientIP
  type: keyword
- name: UserAgent
  type: keyword
- name: ActorContextId
  type: keyword
- name: InterSystemsId
  type: keyword
- name: IntraSystemId
  type: keyword
- name: TargetContextId
  type: keyword
- name: ApplicationId
  type: keyword
# Nested arrays carry most of the weight to reach ~10 KB.
- name: Actor.ID
  type: keyword
- name: Actor.Type
  type: integer
- name: Target.ID
  type: keyword
- name: Target.Type
  type: integer
- name: ExtendedProperties.Name
  type: keyword
- name: ExtendedProperties.Value
  type: keyword
- name: ModifiedProperties.Name
  type: keyword
- name: ModifiedProperties.NewValue
  type: keyword
- name: ModifiedProperties.OldValue
  type: keyword
- name: DeviceProperties.Name
  type: keyword
- name: DeviceProperties.Value
  type: keyword
