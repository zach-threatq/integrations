- name: xm_cyber.audit_trail
  type: group
  fields:
    - name: _id
      type: keyword
      description: XM Cyber's unique audit record identifier. Mapped to ECS `event.id`.
    - name: timestamp
      type: date
      description: Vendor event timestamp. Mapped to ECS `@timestamp`.
    - name: object_type
      type: keyword
      description: The type of object affected by the action (for example, Policy, User, Scenario).
    - name: object_name
      type: keyword
      description: The name or identifier of the object affected.
    - name: event_type
      type: keyword
      description: High-level action performed (for example, Create, Update, Delete, Login).
    - name: event_sub_type
      type: keyword
      description: Finer-grained action detail (for example, SettingsChanged, PasswordReset).
    - name: tenant
      type: keyword
      description: XM Cyber tenant identifier.
    - name: details
      type: keyword
      description: Free-form details about the action.
    - name: user_id
      type: group
      description: Vendor user identifier.
      fields:
        - name: name
          type: keyword
          description: Display name of the user who performed the action.
        - name: email
          type: keyword
          description: Email of the user who performed the action.
    - name: terminal_id
      type: group
      description: Vendor terminal/source identifier.
      fields:
        - name: hostname
          type: keyword
          description: Hostname of the terminal from which the action originated.
        - name: ip
          type: ip
          description: IP address of the terminal from which the action originated.
        - name: ip_string
          type: keyword
          description: IP address of the terminal from which the action originated as a string.
