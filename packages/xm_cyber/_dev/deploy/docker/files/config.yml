rules:
  # Auth — X-Api-Key header
  - path: /api/auth
    methods: ['POST']
    request_headers:
      X-Api-Key: "mock-api-key"
    responses:
      - status_code: 200
        headers:
          Content-Type:
            - 'application/json'
        body: |-
          {{ minify_json `
          {
            "accessToken": "mock-access-token-abc123",
            "refreshToken": "mock-refresh-token-xyz789"
          }
          `}}
  # Token refresh
  - path: /api/refresh-token
    methods: ['POST']
    request_headers:
      Content-Type:
        - 'application/json'
    request_body: /.*"refreshToken".*/
    responses:
      - status_code: 200
        headers:
          Content-Type:
            - 'application/json'
        body: |-
          {{ minify_json `
          {
            "accessToken": "mock-access-token-refreshed-abc123",
            "refreshToken": "mock-refresh-token-refreshed-xyz789"
          }
          `}}
  # Page 2 — fetched via nextLink cursor=page2 (more specific match, must precede page 1)
  - path: /api/audit-trail/auditRecords
    methods: ['GET']
    query_params:
      cursor: 'page2'
    request_headers:
      Authorization: "Bearer mock-access-token-abc123"
    responses:
      - status_code: 200
        headers:
          Content-Type:
            - 'application/json'
        body: |-
          {{ minify_json `
          {
            "data": [
              {
                "_id": "64c3d4e5f60718293a4b5c6d",
                "details": "Example-02 failed to perform domain scan",
                "eventSubType": "SENSOR_SCAN_FAILED",
                "eventType": "ACTIVE_DIRECTORY",
                "objectName": "example.com",
                "objectType": "DOMAIN",
                "tenant": "demo",
                "terminalId": {
                  "hostname": "acme",
                  "ip": "acme"
                },
                "timestamp": "2023-04-18T10:48:50.768Z",
                "userId": {
                  "name": "Automated"
                }
              }
            ],
            "paging": {
              "page": 1,
              "pageSize": 100,
              "total": 3,
              "totalPages": 2,
              "nextLink": null
